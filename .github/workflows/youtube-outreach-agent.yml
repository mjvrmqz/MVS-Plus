name: YouTube Outreach Agent

on:
  schedule:
    - cron: '0 16 * * 6'   # Every Saturday at 9:00 AM PDT (UTC-7)
  repository_dispatch:
    types: [run-youtube-scraper]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Phi-3 Mini model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: phi3-mini-4k-instruct

      - name: Install dependencies
        run: |
          pip install \
            google-api-python-client \
            requests \
            playwright \
            googleapis-common-protos \
            yt-dlp \
            rapidfuzz \
            transformers \
            accelerate
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          playwright install chromium

      # TEMPORARILY DISABLED FOR TESTING — re-enable when not testing Screener in isolation
      # - name: Run YouTube Scraper (5 min limit)
      #   env:
      #     YT_API_KEY_1:   ${{ secrets.YT_API_KEY_1 }}
      #     YT_API_KEY_2:   ${{ secrets.YT_API_KEY_2 }}
      #     YT_API_KEY_3:   ${{ secrets.YT_API_KEY_3 }}
      #     NOTION_KEY:     ${{ secrets.NOTION_KEY }}
      #     GH_PAT:         ${{ secrets.GH_PAT }}
      #     SOURCE_DB_ID:   ${{ secrets.SOURCE_DB_ID }}
      #     OUTREACH_DB_ID: ${{ secrets.OUTREACH_DB_ID }}
      #   run: |
      #     timeout 300 python "Outreach/Scrapers/YouTube/YouTube Scraper.py" || true

      - name: Run YouTube Screener (runs to completion)
        env:
          YT_API_KEY_1:    ${{ secrets.YT_API_KEY_1 }}
          YT_API_KEY_2:    ${{ secrets.YT_API_KEY_2 }}
          YT_API_KEY_3:    ${{ secrets.YT_API_KEY_3 }}
          NOTION_KEY:      ${{ secrets.NOTION_KEY }}
          SOURCE_DB_ID:    ${{ secrets.SOURCE_DB_ID }}
          SCREENING_DB_ID: ${{ secrets.SCREENING_DB_ID }}
        run: |
          python "Outreach/Screening/YouTube/YouTube Screener.py"
