name: Update Projects Feed

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests ics
      - name: Run script
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: python3 "Feeds/Projects Feed/projects_feed_to_ics.py"
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "Feeds/Projects Feed/Projects Feed.ics"
          git diff --cached --quiet && echo "No changes, skipping." && exit 0
          git commit -m "Update Projects Feed $(date -u +"%Y%m%dT%H%M%SZ")"
          git pull --rebase
          git push
