name: YouTube Scraper

on:
  # Trigger manually from Make or any HTTP client
  repository_dispatch:
    types: [run-youtube-scraper]

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install google-api-python-client rapidfuzz requests

      - name: Run YouTube Scraper
        env:
          YT_API_KEY_1:   ${{ secrets.YT_API_KEY_1 }}
          YT_API_KEY_2:   ${{ secrets.YT_API_KEY_2 }}
          YT_API_KEY_3:   ${{ secrets.YT_API_KEY_3 }}
          NOTION_KEY:     ${{ secrets.NOTION_KEY }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
        run: |
          python "Outreach/Scrapers/YouTube Scraper.py"
