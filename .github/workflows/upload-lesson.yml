name: Upload Lesson

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flask pillow requests yt-dlp
      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libavcodec-dev libavformat-dev libavfilter-dev libswscale-dev \
            ffmpeg || true
          # If ffmpeg failed due to libcaca0, install without it
          if ! command -v ffmpeg &>/dev/null; then
            sudo apt-get install -y --no-install-recommends ffmpeg \
              -o APT::Get::Fix-Missing=true \
              -o Dpkg::Options::="--force-depends" || true
            sudo dpkg --configure -a --force-depends || true
          fi
          ffmpeg -version
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
      - name: Start server and print URL
        run: |
          python "Breakdowns/Upload Lesson.py" &
          sleep 2
          cloudflared tunnel --url http://localhost:5000 --no-autoupdate 2>&1 | tee /tmp/cf.log &
          sleep 5
          grep -o 'https://[a-zA-Z0-9.-]*trycloudflare\.com' /tmp/cf.log | head -1 | xargs -I{} echo "OPEN THIS IN CHROME: {}"
          wait
