name: Upload Frame

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run script
        run: python3 "Breakdowns/Upload Frame.py"
