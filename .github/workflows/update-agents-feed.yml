name: Update Agents Feed

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/*.yml'
      - 'Feeds/Agents/agents_feed_to_ics.py'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ics
      - name: Run script
        run: python3 "Feeds/Agents/agents_feed_to_ics.py"
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "Feeds/Agents/Agents Feed.ics"
          git diff --cached --quiet && echo "No changes, skipping." && exit 0
          git commit -m "Update Agents Feed $(date -u +"%Y%m%dT%H%M%SZ")"
          git pull --rebase
          git push
